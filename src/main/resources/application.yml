server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/assistant
    username: app
    password: app
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: assistant
      auto-offset-reset: earliest

    producer:
      acks: all

app:
  topics:
    tasks: agent.tasks
    results: agent.results

  openai:
    model: gpt-4o-mini

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.sthapit.assistant: INFO